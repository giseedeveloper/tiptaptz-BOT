# Copy to /etc/nginx/sites-available/ (adjust paths), enable site, then:
#   sudo certbot --nginx -d wa-notify.YOURDOMAIN.com
#
# DNS: A record wa-notify.YOURDOMAIN.com -> this VPS (178.x.x.x).
# Laravel production .env:
#   WHATSAPP_BOT_NOTIFY_URL=https://wa-notify.YOURDOMAIN.com/notify
#
# Proxy to TipTap notify on the HOST port Docker publishes (see docker-compose.yml).
# Default in this repo: container listens on NOTIFY_PORT (3001) → published as host :3002
# so PM2 apps (e.g. whatsapp-service on :3001, mnnfbot) are not touched.
# Nginx therefore uses 127.0.0.1:3002 below. If you change the compose mapping, change these too.
#
# Inside the container: NOTIFY_BIND=0.0.0.0, NOTIFY_PORT=3001 (typical).
#
# After git pull (or sync) on the VPS, redeploy the bot:
#   docker compose build --no-cache bot && docker compose up -d bot
#
# Verify the correct image: GET /health with no headers should return JSON like
#   {"ok":true,"ready":...} — not {"status":"ok",...} from some other service.
#
# Troubleshooting HTTP 404 / HTML on POST /notify:
# - NEVER use `proxy_pass http://127.0.0.1:3002/;` (trailing slash only) under `location /notify`
#   — nginx forwards POST to `/` on the bot; Express may return 404.
# - Wrong process on the upstream port: HTML "Cannot POST /notify" or {"status":"ok",...} health
#   means Nginx still points at another service (e.g. whatsapp-service on :3001). Use host :3002 for TipTap.
# - Test POST from the host (no extra quotes around the secret — do not wrap $SECRET in '...'):
#     SECRET=$(docker compose exec -T bot printenv NOTIFY_SECRET)
#     curl -sS -w "\nHTTP:%{http_code}\n" -X POST http://127.0.0.1:3002/notify \
#       -H "Content-Type: application/json" -H "X-Bot-Secret: $SECRET" \
#       -d '{"event":"bill_image","order_id":1,"jid":"x@s.whatsapp.net","bill_image_url":"https://example.com/x.png","caption":"t"}'
#   Expect 401 = wrong secret; 503 = WhatsApp not connected; 200/2xx = route OK.

server {
    listen 80;
    server_name wa-notify.YOURDOMAIN.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name wa-notify.YOURDOMAIN.com;

    # After certbot, these lines are filled automatically:
    # ssl_certificate /etc/letsencrypt/live/wa-notify.YOURDOMAIN.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/wa-notify.YOURDOMAIN.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /health {
        proxy_pass http://127.0.0.1:3002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /notify {
        proxy_pass http://127.0.0.1:3002/notify;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
